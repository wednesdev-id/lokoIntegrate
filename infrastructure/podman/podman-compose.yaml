version: "3.8"

networks:
  loko-network:
    driver: bridge

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: loko-postgres
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-loko_db}
      POSTGRES_USER: ${DB_USER:-loko_user}
      POSTGRES_PASSWORD: ${DB_PASS:-loko_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - loko-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-loko_user} -d ${DB_NAME:-loko_db}" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache for Media
  redis:
    image: redis:7-alpine
    container_name: loko-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server --maxmemory ${REDIS_MAX_MEMORY:-512mb} --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - loko-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2024-01-28T22-26-44Z
    container_name: loko-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - loko-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Loko Backend (Production)
  loko-backend:
    build:
      context: ../../
      dockerfile: infrastructure/podman/Containerfile
    container_name: loko-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - "${SERVER_EXTERNAL_PORT:-2000}:${SERVER_PORT:-1234}"
    environment:
      # Server Configuration
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - SERVER_NAME=${SERVER_NAME:-loko-backend}
      - SERVER_PORT=${SERVER_PORT:-1234}

      # Security
      - SECRET_KEY=${SECRET_KEY}
      - JWT_EXPIRED_DAY=${JWT_EXPIRED_DAY:-7}
      - STAY_ALIVE_MINUTE=${STAY_ALIVE_MINUTE:-30}

      # Database - PostgreSQL
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-loko_user}
      - DB_PASS=${DB_PASS:-loko_password}
      - DB_NAME=${DB_NAME:-loko_db}
      - DB_MIGRATION=${DB_MIGRATION:-true}

      # Redis Cache
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}

    networks:
      - loko-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
